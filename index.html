<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="./manifest.json">
  <title>日檢自修室</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #FF82B2;
      --border-color: #FF82B2;
      --btn-bg: #1a0a12;
      --correct-color: #4CAF50;
      --wrong-color: #F44336;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-size: 16px;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlideIn 0.3s ease-out forwards; }

    /* 計時器動畫 */
    @keyframes pulseDanger {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }

    header {
      position: relative;
      text-align: center;
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
    }

    h1 { font-size: 20px; }

    .btn {
      background-color: var(--btn-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.1s ease, background-color 0.2s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: scale(0.95);
      background-color: #331525;
    }

    .btn-large {
      font-size: 20px;
      padding: 15px;
      background-color: #2b0b1a;
      flex-basis: 100% !important;
      font-weight: bold;
    }

    .btn-small {
      font-size: 14px;
      padding: 8px 12px;
      border-color: #555;
      color: #ccc;
      background-color: transparent;
      margin: 20px auto 0 auto;
      display: block;
    }

    .header-btn, .header-btn-left {
      position: absolute;
      top: 10px;
      padding: 5px 10px;
      font-size: 14px;
    }
    .header-btn { right: 15px; }
    .header-btn-left { left: 15px; }

    #main-view { display: flex; flex-direction: column; height: 100%; }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .section { margin-bottom: 20px; }
    .section-title { font-weight: bold; margin-bottom: 10px; font-size: 18px; }
    
    .checkbox-group label, .radio-group label {
      display: inline-block;
      margin-right: 15px;
      margin-bottom: 10px;
    }

    input[type="number"], input[type="range"], input[type="text"] {
      background: transparent;
      color: var(--text-color);
      border: 1px solid var(--border-color);
      padding: 8px;
      border-radius: 5px;
      width: 100%;
      margin-top: 5px;
    }

    input[type="range"] { padding: 0; }
    .range-val { display: inline-block; margin-left: 10px; width: 40px; }

    .action-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }
    .action-btns .btn { flex: 1 1 45%; text-align: center; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-color);
      z-index: 100;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      flex-direction: column;
    }
    .modal-content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .modal-actions {
      padding: 15px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .modal-actions .btn { flex: 1; }

    /* 表單項目 */
    .form-item { margin-bottom: 15px; }
    .req { color: var(--wrong-color); margin-left: 3px; font-weight: bold;}

    /* 考場模式 */
    #quiz-view { display: none; height: 100%; flex-direction: column; }
    .progress-bar { width: 100%; height: 5px; background: #333; }
    .progress-fill { height: 100%; background: var(--border-color); width: 0%; transition: width 0.3s ease; }
    .quiz-header { padding: 10px 20px; text-align: center; border-bottom: 1px solid #333; }
    
    .question-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
    
    .timer-display {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      transition: color 0.3s ease;
    }
    .timer-display.danger {
      color: var(--wrong-color);
      animation: pulseDanger 0.8s infinite;
    }

    .question-text { font-size: 24px; margin-bottom: 30px; }
    .options-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; }
    .option-btn { padding: 15px; font-size: 18px; text-align: left; background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; }
    .option-btn.correct { background-color: var(--correct-color); color: white; border-color: var(--correct-color); }
    .option-btn.wrong { background-color: var(--wrong-color); color: white; border-color: var(--wrong-color); }
    
    .list-item { border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; align-items: center; justify-content: space-between;}
    .list-item-text { flex: 1; font-size: 14px;}
    .edit-btn { font-size: 12px; padding: 4px 8px; margin-left: 10px; border-color: #888; color: #ccc;}
  </style>
</head>
<body>

  <!-- 主頁面 -->
  <div id="main-view" class="fade-in">
    <header>
      <button class="btn header-btn-left" onclick="openCardList()">字卡清單</button>
      <h1>日檢自修室</h1>
      <button class="btn header-btn" onclick="openFavorites()">收藏</button>
    </header>
    <main>
      <div class="section">
        <div class="section-title">選擇級別</div>
        <div class="checkbox-group" id="level-group">
          <label><input type="checkbox" value="收藏"> 收藏</label>
          <label><input type="checkbox" value="N3" checked> N3</label>
          <label><input type="checkbox" value="N2" checked> N2</label>
          <label><input type="checkbox" value="N1" checked> N1</label>
        </div>
      </div>
      <div class="section">
        <div class="section-title">選擇題型</div>
        <div class="checkbox-group" id="qtype-group">
          <label><input type="checkbox" value="拼音" checked> 拼音</label>
          <label><input type="checkbox" value="中翻日" checked> 中翻日</label>
          <label><input type="checkbox" value="日翻中" checked> 日翻中</label>
        </div>
      </div>
      <div class="section">
        <div class="section-title">選擇題目數量</div>
        <input type="number" id="q-count" value="10" min="1">
      </div>
      <div class="section">
        <div class="section-title">選擇字卡數量範圍</div>
        <input type="range" id="pool-size" min="10" max="105" step="5" value="50" oninput="updatePoolLabel(this.value)">
        <span class="range-val" id="pool-label">50</span>
      </div>
      <div class="section">
        <div class="section-title">選擇練習類別</div>
        <div class="checkbox-group" id="ctype-group">
          <label><input type="checkbox" value="單字" checked> 單字</label>
          <label><input type="checkbox" value="語彙" checked> 語彙</label>
          <label><input type="checkbox" value="文法" checked> 文法</label>
        </div>
      </div>
      <div class="action-btns">
        <button class="btn" onclick="openAddCard()">新增字卡</button>
        <button class="btn btn-large" onclick="startQuiz()">開始練習</button>
      </div>
      <button class="btn btn-small" onclick="exportCSV()">匯出 CSV 備份</button>
    </main>
  </div>

  <!-- 考場模式 -->
  <div id="quiz-view">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="quiz-header">
      <div id="quiz-status">剩餘 -- 題</div>
    </div>
    <div class="question-container fade-in" id="question-container">
      <div class="timer-display" id="timer-display">10</div>
      <div class="question-text" id="question-text">題目載入中...</div>
      <div class="options-grid" id="options-grid"></div>
    </div>
  </div>

  <!-- 結算模式 -->
  <div id="result-view" class="modal">
    <header><h1>測驗結算</h1></header>
    <div class="modal-content">
      <h2 id="result-score" style="text-align: center; margin-bottom: 20px;"></h2>
      <div class="section-title">重點錯誤題目 (勾選加入收藏)</div>
      <div id="wrong-list"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="saveResultAndExit()">確定並回主頁</button>
    </div>
  </div>

  <!-- 新增/編輯字卡彈窗 -->
  <div id="form-modal" class="modal">
    <header><h1 id="form-title">新增字卡</h1></header>
    <div class="modal-content">
      <input type="hidden" id="form-idx" value="-1">
      
      <div class="form-item">
        <label>級別<span class="req">*</span></label>
        <div class="radio-group" style="margin-top:5px;">
          <label><input type="radio" name="form-lvl" value="N3" checked> N3</label>
          <label><input type="radio" name="form-lvl" value="N2"> N2</label>
          <label><input type="radio" name="form-lvl" value="N1"> N1</label>
        </div>
      </div>

      <div class="form-item">
        <label>類別<span class="req">*</span></label>
        <div class="radio-group" style="margin-top:5px;">
          <label><input type="radio" name="form-type" value="單字" checked> 單字</label>
          <label><input type="radio" name="form-type" value="語彙"> 語彙</label>
          <label><input type="radio" name="form-type" value="文法"> 文法</label>
        </div>
      </div>

      <div class="form-item">
        <label>日文名稱 (無漢字留空)</label>
        <input type="text" id="form-jp" placeholder="例如：躊躇う">
      </div>

      <div class="form-item">
        <label>日文拼音<span class="req">*</span></label>
        <input type="text" id="form-kana" placeholder="例如：ためらう">
      </div>

      <div class="form-item">
        <label>中文意思<span class="req">*</span></label>
        <input type="text" id="form-zh" placeholder="例如：躊躇、猶豫">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('form-modal')">取消</button>
      <button class="btn" onclick="saveCardForm()">儲存</button>
    </div>
  </div>

  <!-- 收藏清單彈窗 -->
  <div id="fav-modal" class="modal">
    <header><h1>收藏清單</h1></header>
    <div class="modal-content" id="fav-list"></div>
    <div class="modal-actions">
      <button class="btn" onclick="toggleAllFav(true)">全選</button>
      <button class="btn" onclick="toggleAllFav(false)">取消</button>
      <button class="btn" onclick="applyFavChanges()">確定</button>
    </div>
  </div>

  <!-- 總字卡清單彈窗 -->
  <div id="list-modal" class="modal">
    <header><h1>字卡清單 (全)</h1></header>
    <div class="modal-content" id="all-card-list"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('list-modal')" style="flex-basis: 100%;">關閉</button>
    </div>
  </div>

  <script>
    let allCards = [];
    let customCards = JSON.parse(localStorage.getItem('customCards')) || [];
    let editedBaseCards = JSON.parse(localStorage.getItem('editedBaseCards')) || {};
    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
    
    let quizQuestions = [];
    let currentQIndex = 0;
    let correctCount = 0;
    let wrongCards = [];
    let timerInterval;
    let timeLeft = 10;
    let isAnswering = false;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    window.onload = async () => {
      try {
        const res = await fetch('./base_words.csv');
        const text = await res.text();
        parseCSV(text);
      } catch (e) {
        console.log("無法讀取 base_words.csv，以現有儲存為主");
        allCards = [...customCards];
      }
    };

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
      const baseCards = [];
      
      for (let i = 1; i < lines.length; i++) {
        let row = [];
        let inQuotes = false;
        let val = '';
        for (let j = 0; j < lines[i].length; j++) {
          let char = lines[i][j];
          if (char === '"') inQuotes = !inQuotes;
          else if (char === ',' && !inQuotes) { row.push(val.trim()); val = ''; }
          else val += char;
        }
        row.push(val.trim());

        if(row.length >= 5) {
          let c = {
            _uid: 'base_' + i,
            lvl: row[0],
            jp: row[1],
            kana: row[2],
            type: row[3],
            zh: row[4]
          };
          // 支援舊有動詞等詞性直接映射為單字
          if(!['單字', '語彙', '文法'].includes(c.type)) c.type = '單字';
          
          // 應用本地修改紀錄
          if(editedBaseCards[c._uid]) Object.assign(c, editedBaseCards[c._uid]);
          baseCards.push(c);
        }
      }
      allCards = [...baseCards, ...customCards];
    }

    function getCardId(c) { return c._uid || `${c.lvl}_${c.kana}_${c.zh}`; }

    function updatePoolLabel(val) {
      document.getElementById('pool-label').innerText = val > 100 ? 'MAX' : val;
    }

    function switchView(hideId, showId) {
      document.getElementById(hideId).style.display = 'none';
      const showEl = document.getElementById(showId);
      showEl.style.display = 'flex';
      showEl.classList.remove('fade-in');
      void showEl.offsetWidth; 
      showEl.classList.add('fade-in');
    }

    function openModal(id) { 
      const el = document.getElementById(id);
      el.style.display = 'flex'; 
      el.classList.remove('fade-in');
      void el.offsetWidth;
      el.classList.add('fade-in');
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // 開啟新增/編輯表單
    function openAddCard() {
      document.getElementById('form-title').innerText = '新增字卡';
      document.getElementById('form-idx').value = '-1';
      document.getElementById('form-jp').value = '';
      document.getElementById('form-kana').value = '';
      document.getElementById('form-zh').value = '';
      document.querySelector('input[name="form-lvl"][value="N3"]').checked = true;
      document.querySelector('input[name="form-type"][value="單字"]').checked = true;
      openModal('form-modal');
    }

    function openEditCard(idx) {
      const c = allCards[idx];
      document.getElementById('form-title').innerText = '編輯字卡';
      document.getElementById('form-idx').value = idx;
      document.getElementById('form-jp').value = c.jp;
      document.getElementById('form-kana').value = c.kana;
      document.getElementById('form-zh').value = c.zh;
      
      const lvlRadio = document.querySelector(`input[name="form-lvl"][value="${c.lvl}"]`);
      if(lvlRadio) lvlRadio.checked = true;
      const typeRadio = document.querySelector(`input[name="form-type"][value="${c.type}"]`);
      if(typeRadio) typeRadio.checked = true;
      
      openModal('form-modal');
    }

    function saveCardForm() {
      const idx = parseInt(document.getElementById('form-idx').value);
      const lvl = document.querySelector('input[name="form-lvl"]:checked').value;
      const type = document.querySelector('input[name="form-type"]:checked').value;
      const jp = document.getElementById('form-jp').value.trim();
      const kana = document.getElementById('form-kana').value.trim();
      const zh = document.getElementById('form-zh').value.trim();

      if(!kana || !zh) { alert('拼音與中文意思為必填'); return; }

      if(idx === -1) {
        // 新增
        const newCard = { _uid: 'custom_' + Date.now(), lvl, jp, kana, type, zh };
        customCards.push(newCard);
        allCards.push(newCard);
        localStorage.setItem('customCards', JSON.stringify(customCards));
        alert('新增成功');
      } else {
        // 編輯
        allCards[idx].lvl = lvl;
        allCards[idx].type = type;
        allCards[idx].jp = jp;
        allCards[idx].kana = kana;
        allCards[idx].zh = zh;

        const uid = allCards[idx]._uid;
        if(uid.startsWith('custom_')) {
          const cIdx = customCards.findIndex(c => c._uid === uid);
          if(cIdx !== -1) customCards[cIdx] = allCards[idx];
          localStorage.setItem('customCards', JSON.stringify(customCards));
        } else {
          editedBaseCards[uid] = allCards[idx];
          localStorage.setItem('editedBaseCards', JSON.stringify(editedBaseCards));
        }
        alert('修改成功');
        openCardList(); // 重新整理清單畫面
      }
      closeModal('form-modal');
    }

    function openCardList() {
      const listDiv = document.getElementById('all-card-list');
      listDiv.innerHTML = '';
      allCards.forEach((c, idx) => {
        listDiv.innerHTML += `
          <div class="list-item">
            <div class="list-item-text">[${c.lvl}] [${c.type}] ${c.jp || c.kana} - ${c.zh}</div>
            <button class="btn edit-btn" onclick="openEditCard(${idx})">編輯</button>
          </div>
        `;
      });
      openModal('list-modal');
    }

    function openFavorites() {
      const listDiv = document.getElementById('fav-list');
      listDiv.innerHTML = '';
      favorites.forEach((c, idx) => {
        listDiv.innerHTML += `
          <div class="list-item">
            <div class="list-item-text">[${c.lvl}] ${c.jp || c.kana} - ${c.zh}</div>
            <input type="checkbox" class="fav-check" data-idx="${idx}" checked>
          </div>
        `;
      });
      openModal('fav-modal');
    }

    function toggleAllFav(state) {
      document.querySelectorAll('.fav-check').forEach(cb => cb.checked = state);
    }

    function applyFavChanges() {
      const checks = document.querySelectorAll('.fav-check');
      const newFavs = [];
      checks.forEach(cb => {
        if(cb.checked) newFavs.push(favorites[cb.getAttribute('data-idx')]);
      });
      favorites = newFavs;
      localStorage.setItem('favorites', JSON.stringify(favorites));
      closeModal('fav-modal');
    }

    function exportCSV() {
      let csvContent = "\uFEFF級別,日文名稱,日文拼音,類別,中文意思\n";
      allCards.forEach(c => {
        const formatField = (str) => {
          if(!str) return '';
          let s = String(str);
          if(s.includes(',') || s.includes('"')) {
            s = '"' + s.replace(/"/g, '""') + '"';
          }
          return s;
        };
        const row = [c.lvl, c.jp, c.kana, c.type, c.zh].map(formatField).join(',');
        csvContent += row + "\n";
      });
      
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'jp_study_words.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function startQuiz() {
      const getCheckedValues = (id) => Array.from(document.querySelectorAll(`#${id} input:checked`)).map(cb => cb.value);
      
      const levels = getCheckedValues('level-group');
      const qTypes = getCheckedValues('qtype-group');
      const cTypes = getCheckedValues('ctype-group');
      let qCount = parseInt(document.getElementById('q-count').value);
      let poolSize = document.getElementById('pool-size').value;
      
      if(levels.length===0 || qTypes.length===0 || cTypes.length===0 || isNaN(qCount)) {
        alert('請確保勾選所有必要選項'); return;
      }

      let filteredPool = allCards.filter(c => {
        const matchLevel = levels.includes(c.lvl) || (levels.includes('收藏') && favorites.some(f => getCardId(f) === getCardId(c)));
        const matchType = cTypes.includes(c.type); 
        return matchLevel && matchType;
      });

      const uniquePool = [];
      const seenIds = new Set();
      for(const c of filteredPool) {
        const id = getCardId(c);
        if(!seenIds.has(id)) { seenIds.add(id); uniquePool.push(c); }
      }
      filteredPool = uniquePool;

      if(filteredPool.length === 0) { alert('符合條件的字卡為0，請調整範圍'); return; }

      shuffleArray(filteredPool);
      if(poolSize <= 100 && poolSize < filteredPool.length) {
        filteredPool = filteredPool.slice(0, poolSize);
      }

      quizQuestions = [];
      wrongCards = [];
      for(let i=0; i<qCount; i++) {
        const correctCard = filteredPool[Math.floor(Math.random() * filteredPool.length)];
        
        let availableTypes = [...qTypes];
        if(!correctCard.jp) availableTypes = availableTypes.filter(t => t !== '拼音');
        if(availableTypes.length === 0) { i--; continue; }
        
        const qType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
        const questionObj = buildQuestion(correctCard, qType, filteredPool);
        quizQuestions.push(questionObj);
      }

      if(quizQuestions.length === 0) { alert('無法產生足夠題目'); return; }

      currentQIndex = 0;
      correctCount = 0;
      switchView('main-view', 'quiz-view');
      loadNextQuestion();
    }

    function buildQuestion(card, type, pool) {
      let qText = '', correctAns = '', distractorField = '';
      
      if(type === '拼音') {
        qText = `【拼音】${card.jp}`; correctAns = card.kana; distractorField = 'kana';
      } else if(type === '中翻日') {
        qText = `【中翻日】${card.zh}`; correctAns = card.jp || card.kana; distractorField = 'jpOrKana';
      } else if(type === '日翻中') {
        qText = `【日翻中】${card.jp || card.kana}`; correctAns = card.zh; distractorField = 'zh';
      }

      let distractors = pool.filter(c => getCardId(c) !== getCardId(card)).map(c => {
        if(distractorField === 'jpOrKana') return c.jp || c.kana;
        return c[distractorField];
      });
      
      distractors = [...new Set(distractors.filter(d => d && d !== correctAns))];
      
      if(type === '拼音' && distractors.length > 3) {
        const lengthMatch = distractors.filter(d => d.length === correctAns.length);
        if(lengthMatch.length >= 3) distractors = lengthMatch;
      }

      shuffleArray(distractors);
      let options = [correctAns];
      while(options.length < 4) {
        if(distractors.length > 0) options.push(distractors.pop());
        else options.push('n/a');
      }
      shuffleArray(options);

      return {
        card: card, type: type, qText: qText, options: options, correctIdx: options.indexOf(correctAns)
      };
    }

    function loadNextQuestion() {
      if(currentQIndex >= quizQuestions.length) { showResult(); return; }
      isAnswering = false;
      
      const container = document.getElementById('question-container');
      container.classList.remove('fade-in');
      void container.offsetWidth;
      container.classList.add('fade-in');

      const timerEl = document.getElementById('timer-display');
      timerEl.classList.remove('danger');

      const q = quizQuestions[currentQIndex];
      document.getElementById('question-text').innerText = q.qText;
      document.getElementById('quiz-status').innerText = `剩餘 ${quizQuestions.length - currentQIndex} 題`;
      
      const grid = document.getElementById('options-grid');
      grid.innerHTML = '';
      q.options.forEach((opt, idx) => {
        grid.innerHTML += `<button class="option-btn" onclick="selectOption(${idx})">${opt}</button>`;
      });

      const progress = ((currentQIndex) / quizQuestions.length) * 100;
      document.getElementById('progress-fill').style.width = `${progress}%`;

      startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = 10;
      const timerEl = document.getElementById('timer-display');
      timerEl.innerText = timeLeft;
      timerEl.classList.remove('danger');

      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        
        if (timeLeft <= 3 && !timerEl.classList.contains('danger')) {
          timerEl.classList.add('danger');
        }

        if(timeLeft <= 0) {
          clearInterval(timerInterval);
          handleTimeOut();
        }
      }, 1000);
    }

    function handleTimeOut() {
      if(isAnswering) return;
      isAnswering = true;
      const q = quizQuestions[currentQIndex];
      wrongCards.push(q.card);
      const btns = document.querySelectorAll('.option-btn');
      btns[q.correctIdx].classList.add('correct');
      setTimeout(() => { currentQIndex++; loadNextQuestion(); }, 1500);
    }

    function selectOption(idx) {
      if(isAnswering) return;
      isAnswering = true;
      clearInterval(timerInterval);
      
      const q = quizQuestions[currentQIndex];
      const btns = document.querySelectorAll('.option-btn');
      
      if(idx === q.correctIdx) {
        correctCount++;
        btns[idx].classList.add('correct');
      } else {
        wrongCards.push(q.card);
        btns[idx].classList.add('wrong');
        btns[q.correctIdx].classList.add('correct');
      }

      setTimeout(() => { currentQIndex++; loadNextQuestion(); }, 1000);
    }

    function showResult() {
      document.getElementById('quiz-view').style.display = 'none';
      const resultRate = Math.round((correctCount / quizQuestions.length) * 100);
      document.getElementById('result-score').innerText = `正解率: ${resultRate}% (${correctCount}/${quizQuestions.length})`;
      
      const uniqueWrong = [];
      const seen = new Set();
      wrongCards.forEach(c => {
        const id = getCardId(c);
        if(!seen.has(id)) { seen.add(id); uniqueWrong.push(c); }
      });

      const listDiv = document.getElementById('wrong-list');
      listDiv.innerHTML = '';
      uniqueWrong.forEach((c, idx) => {
        const isFav = favorites.some(f => getCardId(f) === getCardId(c));
        listDiv.innerHTML += `
          <div class="list-item">
            <div class="list-item-text">[${c.lvl}] ${c.jp || c.kana} - ${c.zh}</div>
            <input type="checkbox" class="result-fav-check" data-idx="${idx}" checked>
          </div>
        `;
      });
      
      window.currentWrongCards = uniqueWrong;
      openModal('result-view');
    }

    function saveResultAndExit() {
      const checks = document.querySelectorAll('.result-fav-check');
      checks.forEach(cb => {
        const card = window.currentWrongCards[cb.getAttribute('data-idx')];
        const isChecked = cb.checked;
        const existsIdx = favorites.findIndex(f => getCardId(f) === getCardId(card));
        
        if(isChecked && existsIdx === -1) favorites.push(card);
        else if(!isChecked && existsIdx !== -1) favorites.splice(existsIdx, 1);
      });
      localStorage.setItem('favorites', JSON.stringify(favorites));
      closeModal('result-view');
      switchView('quiz-view', 'main-view');
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }
  </script>
</body>
